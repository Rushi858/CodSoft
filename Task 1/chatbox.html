<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buddy Bot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#EEF2FF,#F9FAFB,#FFFFFF);
}

.chat-container{
    width:390px;
    height:700px;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(18px);
    border-radius:28px;
    overflow:hidden;
    box-shadow:
        0 15px 40px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.7);
    border:1px solid rgba(255,255,255,.6);
}

.chat-header{
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(15px);
    padding:18px;
    text-align:center;
    border-bottom:1px solid #E5E7EB;
}

.chat-header h2{
    color:#222;
    font-size:22px;
}

.chat-header p{
    color:#777;
    font-size:13px;
    margin-top:4px;
}

.chat-box{
    height:560px;
    overflow-y:auto;
    padding:18px;
    background:#F7F8FC;
}

.chat-box::-webkit-scrollbar{
    width:6px;
}

.chat-box::-webkit-scrollbar-thumb{
    background:#CFCFCF;
    border-radius:10px;
}

.user-message,
.bot-message{
    max-width:78%;
    padding:12px 16px;
    margin:12px 0;
    border-radius:20px;
    font-size:15px;
    line-height:1.5;
    animation:fade .25s ease;
}

.bot-message{
    background:white;
    color:#333;
    border-bottom-left-radius:6px;
    box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.user-message{
    margin-left:auto;
    background:#0A84FF;
    color:white;
    border-bottom-right-radius:6px;
    box-shadow:0 5px 15px rgba(10,132,255,.25);
}

.input-area{
    display:flex;
    padding:15px;
    background:rgba(255,255,255,.9);
    border-top:1px solid #E5E7EB;
}

input{
    flex:1;
    border:none;
    outline:none;
    background:#F3F4F6;
    border-radius:25px;
    padding:14px 18px;
    font-size:15px;
}

button{
    margin-left:10px;
    border:none;
    background:#0A84FF;
    color:white;
    width:55px;
    border-radius:50%;
    cursor:pointer;
    font-size:18px;
    transition:.25s;
}

button:hover{
    transform:scale(1.08);
    background:#006BE6;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(8px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        <h2>🤖 Buddy Bot</h2>
        <p>Always here for a friendly conversation</p>
    </div>

    <div class="chat-box" id="chat-box">
        <div class="bot-message">
            Hi there! 👋 I'm <strong>Buddy Bot</strong>. It's nice to meet you. What's on your mind today?
        </div>
    </div>

    <div class="input-area">
        <input
            type="text"
            id="user-input"
            placeholder="Message Buddy Bot..."
        >
        <button onclick="sendMessage()">➜</button>
    </div>

</div>

<script>

const chatBox=document.getElementById("chat-box");
const userInput=document.getElementById("user-input");

function addMessage(message,sender){

const div=document.createElement("div");
div.className=sender+"-message";
div.innerHTML=message;

chatBox.appendChild(div);
chatBox.scrollTop=chatBox.scrollHeight;

}

function sendMessage(){

let message=userInput.value.trim();

if(message==="") return;

addMessage(message,"user");

userInput.value="";

setTimeout(()=>{
addMessage(getReply(message),"bot");
},500);

}

function getReply(message){

message=message.toLowerCase();

if(message.includes("hi")||message.includes("hello")||message.includes("hey")){
return "Hello! 😊 It's great to see you. How's your day going?";
}

else if(message.includes("how are you")){
return "I'm doing really well, thanks for asking! I hope you're having a good day too.";
}

else if(message.includes("good")||message.includes("fine")){
return "That's wonderful! 😊 I hope the rest of your day goes just as well.";
}

else if(message.includes("your name")){
return "I'm <b>Buddy Bot</b>, your friendly chat companion.";
}

else if(message.includes("time")){
return "🕒 It's currently <b>"+new Date().toLocaleTimeString()+"</b>.";
}

else if(message.includes("date")){
return "📅 Today is <b>"+new Date().toLocaleDateString()+"</b>.";
}

else if(message.includes("college")){
return "College is a great place to learn, grow, and make lifelong memories. What are you studying?";
}

else if(message.includes("study")){
return "A little progress every day adds up to big results. 📚";
}

else if(message.includes("coding")||message.includes("programming")){
return "Building small projects is one of the best ways to improve your coding skills.";
}

else if(message.includes("html")){
return "HTML is the backbone of every webpage.";
}

else if(message.includes("css")){
return "CSS gives personality and style to websites. 🎨";
}

else if(message.includes("javascript")||message.includes("js")){
return "JavaScript makes websites interactive and fun to use.";
}

else if(message.includes("python")){
return "Python is beginner-friendly and incredibly powerful.";
}

else if(message.includes("java")){
return "Java is reliable and widely used in enterprise and Android development.";
}

else if(message.includes("weather")){
return "I can't check live weather yet, but I hope it's a beautiful day where you are. ☀️";
}

else if(message.includes("joke")){
const jokes=[
"😂 Why do programmers prefer dark mode? Because light attracts bugs.",
"😂 Why did the computer get cold? It forgot to close Windows.",
"😂 Why was the JavaScript developer sad? Because they didn't Node how to Express themselves."
];
return jokes[Math.floor(Math.random()*jokes.length)];
}

else if(message.includes("thank")){
return "You're very welcome! I'm always happy to help. 😊";
}

else if(message.includes("bye")){
return "Take care! 👋 It was really nice chatting with you. See you again soon!";
}

else if(message.includes("help")){
return "You can ask me about programming, college, time, date, or simply chat with me like a friend.";
}

else{

const replies=[
"That's interesting! Tell me more. 😊",
"I'd love to hear more about that.",
"Hmm... that's something worth thinking about.",
"Thanks for sharing that with me.",
"I'm still learning, but I'm enjoying our conversation!",
"That's pretty cool! 😄",
"Can you explain that a little differently?",
"I'm listening. Go on!"
];

return replies[Math.floor(Math.random()*replies.length)];

}

}

userInput.addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendMessage();
}
});

</script>

</body>
</html>
