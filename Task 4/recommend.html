<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Recommendation System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:1100px;
    margin:auto;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:10px;
    color:#FFD700;
}

.subtitle{
    text-align:center;
    margin-bottom:30px;
    color:#ddd;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}

select,button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    background:#ff4757;
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ff6b81;
}

.movies{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    color:black;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.poster{
    height:250px;
    background-size:cover;
    background-position:center;
}

.info{
    padding:15px;
}

.genre{
    color:#ff4757;
    font-weight:bold;
}

.rating{
    color:#ff9800;
    font-weight:bold;
}

#message{
    margin:25px 0;
    text-align:center;
    font-size:20px;
    color:#FFD700;
}
</style>

</head>
<body>

<div class="container">

<h1>🎬 Movie Recommendation System</h1>
<p class="subtitle">
Select your favorite genre and minimum rating to get personalized movie recommendations.
</p>

<div class="controls">

<select id="genre">
<option value="All">All Genres</option>
<option>Action</option>
<option>Comedy</option>
<option>Drama</option>
<option>Sci-Fi</option>
<option>Animation</option>
<option>Thriller</option>
<option>Adventure</option>
</select>

<select id="rating">
<option value="0">Any Rating</option>
<option value="7">7+</option>
<option value="8">8+</option>
<option value="9">9+</option>
</select>

<button onclick="recommend()">Recommend Movies</button>

</div>

<div id="message"></div>

<div class="movies" id="movies"></div>

</div>

<script>

const movies=[
{
title:"Avengers: Endgame",
genre:"Action",
rating:8.4,
poster:"https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600"
},

{
title:"Interstellar",
genre:"Sci-Fi",
rating:8.7,
poster:"https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=600"
},

{
title:"The Dark Knight",
genre:"Action",
rating:9.0,
poster:"https://images.unsplash.com/photo-1478720568477-152d9b164e26?w=600"
},

{
title:"Toy Story",
genre:"Animation",
rating:8.3,
poster:"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600"
},

{
title:"The Pursuit of Happyness",
genre:"Drama",
rating:8.0,
poster:"https://images.unsplash.com/photo-1485846234645-a62644f84728?w=600"
},

{
title:"Inception",
genre:"Sci-Fi",
rating:8.8,
poster:"https://images.unsplash.com/photo-1518676590629-3dcbd9c5a5c9?w=600"
},

{
title:"Jumanji",
genre:"Adventure",
rating:7.5,
poster:"https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?w=600"
},

{
title:"The Hangover",
genre:"Comedy",
rating:7.7,
poster:"https://images.unsplash.com/photo-1505685296765-3a2736de412f?w=600"
},

{
title:"Gone Girl",
genre:"Thriller",
rating:8.1,
poster:"https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600"
}
];

displayMovies(movies);

function displayMovies(list){

const movieDiv=document.getElementById("movies");

movieDiv.innerHTML="";

list.forEach(movie=>{

movieDiv.innerHTML+=`

<div class="card">

<div class="poster" style="background-image:url('${movie.poster}')"></div>

<div class="info">

<h3>${movie.title}</h3>

<p class="genre">${movie.genre}</p>

<p class="rating">⭐ ${movie.rating}</p>

</div>

</div>

`;

});

}

function recommend(){

let genre=document.getElementById("genre").value;

let rating=parseFloat(document.getElementById("rating").value);

let filtered=movies.filter(movie=>{

let genreMatch=(genre==="All" || movie.genre===genre);

let ratingMatch=movie.rating>=rating;

return genreMatch && ratingMatch;

});

const message=document.getElementById("message");

if(filtered.length>0){

const randomMessages=[

"😊 Based on your taste, you might enjoy these movies!",

"🍿 Great choice! Here are your personalized recommendations.",

"🎥 We found some movies you'll probably love!",

"🤩 These movies match your preferences perfectly!",

"❤️ We think these movies are perfect for your next movie night!"

];

message.innerHTML=randomMessages[Math.floor(Math.random()*randomMessages.length)];

displayMovies(filtered);

}

else{

message.innerHTML="😔 Sorry, no movies match your preferences. Try another filter.";

displayMovies([]);

}

}

</script>

</body>
</html>
